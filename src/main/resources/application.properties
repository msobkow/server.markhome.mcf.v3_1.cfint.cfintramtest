#application.properties for CFIntRamTest
# user configuration options
jakarta.persistence.jdbc.url=jdbc:postgresql://127.0.0.1:5432/myappdb
jakarta.persistence.jdbc.user=postgres
jakarta.persistence.jdbc.password=mypgpassword
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# cfsec31 specific user configuration options
#cfsec31.jakarta.persistence.jdbc.url=jdbc:postgresql://127.0.0.1:5432/cfsec31
#cfsec31.jakarta.persistence.jdbc.user=postgres
#cfsec31.jakarta.persistence.jdbc.password=mypgpassword
#cfsec31.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#cfsec31.hibernate.hbm2ddl.auto=create
cfsec31.hibernate.hbm2ddl.auto=update
cfsec31.hibernate.show_sql=false
cfsec31.hibernate.format_sql=false
cfsec31.hibernate.use_sql_comments=false
cfsec31.hikari.maximum-pool-size=10
cfsec31.hikari.minimum-idle=2

# cfint31 specific user configuration options
#cfint31.jakarta.persistence.jdbc.url=jdbc:postgresql://127.0.0.1:5432/cfint31
#cfint31.jakarta.persistence.jdbc.user=postgres
#cfint31.jakarta.persistence.jdbc.password=mypgpassword
#cfint31.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#cfint31.hibernate.hbm2ddl.auto=create
cfint31.hibernate.hbm2ddl.auto=update
cfint31.hibernate.show_sql=false
cfint31.hibernate.format_sql=false
cfint31.hibernate.use_sql_comments=false
cfint31.hikari.maximum-pool-size=10
cfint31.hikari.minimum-idle=2

# Global defaults
jakarta.persistence.create-database-schemas=true

hibernate.hbm2ddl.auto=update
hibernate.show_sql=false
hibernate.format_sql=false
hibernate.use_sql_comments=false

hikari.auto-commit=false
hikari.maximum-pool-size=10
hikari.minimum-idle=2

# CFSec31 compiled-in mappings; do not change!
cfsec31.hibernate.default_schema=cfsec31
cfsec31.hikari.pool-name=CFSec31HikariCP

# CFInt31 compiled-in mappings; do not change!
cfint31.hibernate.default_schema=cfint31
cfint31.hikari.pool-name=CFInt31HikariCP
